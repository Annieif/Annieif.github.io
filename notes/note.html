<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记 — Annieif</title>
<link rel="icon" href="../icon.png">
<style>
  :root{
    --bg:#0a0a0a;--ink:#e8e4dd;--ink-dim:#c4bfb4;--ink-faint:#6e6a62;
    --accent:#f4c2d0;--line:rgba(232,228,221,.10);
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  body{font-family:"Fraunces",serif;min-height:100svh}
  .back{
    display:inline-flex;align-items:center;gap:8px;
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.18em;
    color:var(--ink-faint);text-decoration:none;text-transform:uppercase;
    padding:32px 28px 0;transition:color .3s var(--ease);
  }
  .back:hover{color:var(--accent)}
  .back::before{content:'←';font-size:13px}

  .layout{display:flex;max-width:960px;margin:0 auto;padding:60px 28px 120px;gap:48px;align-items:flex-start}
  @media(max-width:900px){.layout{flex-direction:column;padding:40px 18px 80px;gap:32px}}

  .note-toc{width:160px;flex-shrink:0;position:fixed;left:max(18px, calc((100vw - 960px) / 2 + 28px));top:50%;transform:translateY(-50%);z-index:10;max-height:70vh;overflow-y:auto}
  .note-toc .toc-label{
    font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.22em;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:16px;
  }
  .note-toc a{
    display:block;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;
    color:var(--ink-faint);text-decoration:none;padding:5px 0 5px 10px;
    border-left:1px solid var(--line);
    transition:color .3s var(--ease),border-color .3s var(--ease),padding .3s var(--ease);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .note-toc a:hover{color:var(--ink);border-color:var(--ink-faint)}
  .note-toc a.active{color:var(--accent);border-color:var(--accent);padding-left:16px}
  .note-toc a.toc-h3{padding-left:22px;font-size:9px;letter-spacing:.08em}
  @media(max-width:900px){
    .note-toc{width:auto;position:static;display:flex;flex-wrap:wrap;gap:8px;align-items:baseline}
    .note-toc .toc-label{display:none}
    .note-toc a{border-left:none;border-bottom:1px solid var(--line);padding:4px 0;margin-right:12px;white-space:normal}
    .note-toc a.active{border-bottom-color:var(--accent);padding-left:0}
  }

  article{flex:1;min-width:0}
  article .ndate{
    font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.2em;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:28px;
  }
  article h1{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:600;
    font-size:clamp(36px,6vw,64px);line-height:1.1;letter-spacing:-.015em;
    color:var(--ink);margin-bottom:48px;
  }
  article .content{
    font-family:"Fraunces",serif;font-weight:400;font-size:16px;line-height:1.8;
    color:var(--ink-dim);
  }
  article .content p{margin-bottom:1.2em}
  article .content h2{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:600;
    font-size:28px;color:var(--ink);margin:2em 0 .6em;scroll-margin-top:40px;
  }
  article .content h3{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:600;
    font-size:22px;color:var(--ink);margin:1.6em 0 .5em;scroll-margin-top:40px;
  }
  article .content a{color:var(--accent);text-decoration:underline}
  article .content code{
    font-family:"IBM Plex Mono",monospace;font-size:.85em;
    background:rgba(232,228,221,.06);padding:2px 6px;border-radius:3px;
  }
  article .content pre{
    background:rgba(232,228,221,.04);border:1px solid var(--line);
    padding:18px 20px;border-radius:4px;overflow-x:auto;
    font-family:"IBM Plex Mono",monospace;font-size:13px;line-height:1.6;margin:1em 0;
  }
  article .content pre code{background:none;padding:0}
  article .content hr{border:none;border-top:1px solid var(--line);margin:2em 0}
  article .content blockquote{
    border-left:2px solid var(--accent);padding-left:16px;
    color:var(--ink-dim);font-style:italic;margin:1em 0;
  }
  article .content ul,article .content ol{padding-left:1.5em;margin:1em 0}
  article .content li{margin-bottom:.4em}
  .not-found{text-align:center;padding:120px 28px;color:var(--ink-faint)}
  .not-found em{color:var(--accent);font-style:normal}
  .footer{text-align:center;padding:0 28px 40px;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.14em;color:var(--ink-faint)}
</style>
</head>
<body>

<a class="back" href="../index.html#notes">返回笔记</a>

<div class="layout">
  <nav class="note-toc" id="noteTOC">
    <div class="toc-label">目录</div>
  </nav>
  <article id="noteArticle">
    <div class="not-found">加载中…</div>
  </article>
</div>

<div class="footer">Annieif · notes</div>

<script src="data.js"></script>
<script>
(function renderNote(){
  const hash = location.hash.replace('#','');
  if (!hash) { location.hash = '001'; return; }

  const note = NOTES_DATA.find(n => n.id === hash);
  const article = document.getElementById('noteArticle');
  if (!article) return;

  if (!note) {
    article.innerHTML = '<div class="not-found">没有找到笔记 <em>#' + hash + '</em></div>';
    document.title = '未找到 — Annieif';
    return;
  }

  document.title = note.title + ' — Annieif';

  const ndate = document.createElement('div');
  ndate.className = 'ndate';
  ndate.textContent = note.date;

  const h1 = document.createElement('h1');
  h1.textContent = note.title;

  const content = document.createElement('div');
  content.className = 'content';
  content.id = 'noteContent';
  content.innerHTML = note.content;

  article.innerHTML = '';
  article.appendChild(ndate);
  article.appendChild(h1);
  article.appendChild(content);

  // Build TOC from h2/h3
  const toc = document.getElementById('noteTOC');
  if (!toc) return;
  const headings = content.querySelectorAll('h2, h3');
  if (!headings.length) { toc.style.display = 'none'; return; }

  const links = [];
  headings.forEach(h => {
    if (!h.id) h.id = (h.textContent || '').trim().replace(/\s+/g,'-').replace(/[^\w\u4e00-\u9fff\-]/g,'').slice(0,30) || 'sec-' + Math.random().toString(36).slice(2,6);
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.trim();
    if (h.tagName === 'H3') a.className = 'toc-h3';
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior:'smooth', block:'start' });
    });
    toc.appendChild(a);
    links.push({ el:h, link:a });
  });

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const match = links.find(l => l.el === e.target);
      if (!match) return;
      if (e.isIntersecting) {
        links.forEach(l => l.link.classList.remove('active'));
        match.link.classList.add('active');
      }
    });
  }, { rootMargin:'-10% 0px -70% 0px', threshold:0 });
  headings.forEach(h => observer.observe(h));
})();
</script>
</body>
</html>
