<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记 — Annieif</title>
<link rel="icon" href="../icon.png">
<style>
  :root{
    --bg:#0a0a0a;--ink:#e8e4dd;--ink-dim:#c4bfb4;--ink-faint:#6e6a62;
    --accent:#f4c2d0;--accent-soft:rgba(244,194,208,.18);
    --line:rgba(232,228,221,.10);--line-strong:rgba(232,228,221,.18);
    --serif-display:"Cormorant Garamond",serif;
    --serif-body:"Fraunces",serif;
    --mono:"IBM Plex Mono",monospace;
    --ease:cubic-bezier(.2,.8,.2,1);
    --measure:62ch;  /* 理想正文行宽 */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{font-family:var(--serif-body);min-height:100svh;font-size:17px;line-height:1.85;color:var(--ink-dim);font-weight:390;letter-spacing:.005em}
  .back{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.22em;
    color:var(--ink-faint);text-decoration:none;text-transform:uppercase;
    padding:36px 32px 0;transition:color .3s var(--ease);
  }
  .back:hover{color:var(--accent)}
  .back::before{content:'←';font-size:13px;transition:transform .3s var(--ease)}
  .back:hover::before{transform:translateX(-3px)}

  .layout{
    display:grid;
    grid-template-columns:minmax(0,1fr);
    max-width:840px;
    margin:0 auto;
    padding:72px 32px 140px;
    gap:56px;
    position:relative;
  }

  /* 左侧目录：宽屏时贴在正文左边外侧，不挤占正文行宽 */
  .note-toc{
    display:none;  /* 默认隐藏；有内容时 JS 会加 .show */
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    left:max(24px, calc((100vw - 840px) / 2 - 220px));
    width:200px;
    max-height:75vh;
    overflow-y:auto;
    z-index:10;
    padding:14px 0;
  }
  .note-toc.show{display:block}
  .note-toc .toc-label{
    font-family:var(--mono);font-size:9px;letter-spacing:.28em;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:18px;
  }
  .note-toc a{
    display:block;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.02em;
    color:var(--ink-faint);text-decoration:none;
    padding:4px 0 4px 14px;
    margin-left:4px;
    border-left:1px solid var(--line);
    transition:color .3s var(--ease),border-color .3s var(--ease),padding-left .3s var(--ease);
    line-height:1.4;
  }
  .note-toc a:hover{color:var(--ink);border-color:var(--ink-faint)}
  .note-toc a.active{color:var(--accent);border-color:var(--accent);padding-left:20px}
  .note-toc a.toc-h3{font-size:9.5px;color:var(--ink-faint);padding-left:24px;opacity:.85}
  .note-toc a.toc-h3.active{color:var(--accent);opacity:1}

  article{min-width:0;max-width:100%}
  article .ndate{
    font-family:var(--mono);font-size:11px;letter-spacing:.28em;
    color:var(--ink-faint);text-transform:uppercase;margin-bottom:24px;
  }
  article h1{
    font-family:var(--serif-display);font-style:italic;font-weight:500;
    font-size:clamp(38px,5.4vw,62px);
    line-height:1.08;letter-spacing:-.015em;
    color:var(--ink);margin:0 0 56px;
  }
  /* 一条细的粉色装饰线，用于分隔标题与正文 */
  article h1::after{
    content:'';display:block;width:44px;height:1px;margin-top:28px;
    background:linear-gradient(90deg,var(--accent),transparent);border-radius:1px;
  }
  article .content{
    font-family:var(--serif-body);font-weight:400;font-size:17px;line-height:1.85;
    color:var(--ink-dim);
  }

  /* — 段落：宽松行距 + 首段不加顶距 — */
  article .content > p{margin:0 0 1.35em;hyphens:auto}
  article .content > p:first-child{margin-top:0}

  /* — 二级标题：大斜体 + 上下留白，章节节奏 — */
  article .content h2{
    font-family:var(--serif-display);font-style:italic;font-weight:500;
    font-size:clamp(26px,2.8vw,34px);
    color:var(--ink);
    margin:3em 0 .7em;
    line-height:1.25;letter-spacing:-.008em;
    scroll-margin-top:48px;position:relative;
  }
  /* 章节编号小圆点 */
  article .content h2::before{
    content:'';display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--accent);margin-right:14px;vertical-align:.35em;
    box-shadow:0 0 12px rgba(244,194,208,.55);
  }
  article .content h3{
    font-family:var(--serif-display);font-style:italic;font-weight:500;
    font-size:clamp(20px,2.1vw,24px);
    color:var(--ink);
    margin:2em 0 .5em;line-height:1.3;
    scroll-margin-top:48px;
  }

  /* — 链接 — */
  article .content a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(244,194,208,.35);transition:border-color .25s var(--ease)}
  article .content a:hover{border-bottom-color:var(--accent)}

  /* — 行内代码 — */
  article .content code{
    font-family:var(--mono);font-size:.82em;letter-spacing:.01em;
    background:rgba(232,228,221,.05);
    padding:1px 6px;border-radius:3px;
    color:#e8e4dd;border:1px solid var(--line);
  }
  /* — 代码块 — */
  article .content pre{
    background:rgba(232,228,221,.03);
    border:1px solid var(--line);
    padding:20px 24px;border-radius:6px;overflow-x:auto;
    font-family:var(--mono);font-size:13px;line-height:1.7;margin:1.4em 0;
  }
  article .content pre code{background:none;border:none;padding:0}

  /* — 水平线 — */
  article .content hr{
    border:none;margin:2.4em auto;
    height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);
    max-width:160px;
  }

  /* — 引用块 — */
  article .content blockquote{
    border-left:2px solid var(--accent);
    padding:.2em 0 .2em 18px;
    margin:1.4em 0;
    color:var(--ink-dim);font-style:italic;
    background:linear-gradient(90deg,var(--accent-soft),transparent 60%);
    border-radius:0 4px 4px 0;
  }
  article .content blockquote p{margin:.4em 0}

  /* — 高亮标记 ==text== — */
  article .content mark{
    background:rgba(244,194,208,.15);
    color:var(--ink);
    padding:1px 5px;margin:0 1px;
    border-radius:3px;
    font-weight:450;
    box-shadow:0 0 0 1px rgba(244,194,208,.12);
  }

  /* — 列表 — */
  article .content ul,article .content ol{padding-left:1.35em;margin:1em 0 1.35em}
  article .content li{margin-bottom:.45em;line-height:1.7}
  article .content ul li::marker{color:var(--accent);font-size:.85em}
  article .content ol li::marker{color:var(--ink-faint);font-family:var(--mono);font-size:.85em}

  /* — 强调与斜体 — */
  article .content strong{color:var(--ink);font-weight:600}
  article .content em{font-style:italic;color:var(--ink)}

  /* — 响应式 — */
  @media(max-width:900px){
    body{font-size:16px;line-height:1.8}
    .layout{padding:40px 20px 100px;gap:32px}
    .note-toc{
      position:static;transform:none;width:auto;display:none;
      flex-wrap:wrap;gap:10px 16px;padding:0 0 16px;
      border-bottom:1px solid var(--line);margin-bottom:8px;
    }
    .note-toc.show{display:flex}
    .note-toc .toc-label{display:none}
    .note-toc a{
      border-left:none;border-bottom:1px solid transparent;
      padding:3px 0;margin:0;white-space:normal;
    }
    .note-toc a.active{padding-left:0}
    article .content h2{font-size:26px}
    article .content h3{font-size:20px}
    article .content pre{font-size:12.5px;padding:16px 18px}
  }

  .not-found{text-align:center;padding:120px 28px;color:var(--ink-faint);font-family:var(--mono);font-size:12px;letter-spacing:.15em;text-transform:uppercase}
  .not-found em{color:var(--accent);font-style:normal}
  .footer{text-align:center;padding:0 28px 40px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase}
</style>
</head>
<body>

<a class="back" href="../index.html#notes">返回笔记</a>

<div class="layout">
  <nav class="note-toc" id="noteTOC">
    <div class="toc-label">目录</div>
  </nav>
  <article id="noteArticle">
    <div class="not-found">加载中…</div>
  </article>
</div>

<div class="footer">Annieif · notes</div>

<script src="data.js"></script>
<script>
(function renderNote(){
  const hash = location.hash.replace('#','');
  if (!hash) { location.hash = '001'; return; }

  const note = NOTES_DATA.find(n => n.id === hash);
  const article = document.getElementById('noteArticle');
  if (!article) return;

  if (!note) {
    article.innerHTML = '<div class="not-found">没有找到笔记 <em>#' + hash + '</em></div>';
    document.title = '未找到 — Annieif';
    return;
  }

  document.title = note.title + ' — Annieif';

  const ndate = document.createElement('div');
  ndate.className = 'ndate';
  ndate.textContent = note.date;

  const h1 = document.createElement('h1');
  h1.textContent = note.title;

  const content = document.createElement('div');
  content.className = 'content';
  content.id = 'noteContent';
  content.innerHTML = note.content;

  article.innerHTML = '';
  article.appendChild(ndate);
  article.appendChild(h1);
  article.appendChild(content);

  // Build TOC from h2/h3
  const toc = document.getElementById('noteTOC');
  const headings = content.querySelectorAll('h2, h3');
  if (!toc || !headings.length) { if (toc) toc.classList.remove('show'); return; }

  // 先清空原目录内容（保留 .toc-label）
  toc.innerHTML = '<div class="toc-label">目录</div>';
  toc.classList.add('show');

  const links = [];
  headings.forEach(h => {
    if (!h.id) h.id = (h.textContent || '').trim().replace(/\s+/g,'-').replace(/[^\w\u4e00-\u9fff\-]/g,'').slice(0,30) || 'sec-' + Math.random().toString(36).slice(2,6);
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.trim();
    if (h.tagName === 'H3') a.className = 'toc-h3';
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior:'smooth', block:'start' });
    });
    toc.appendChild(a);
    links.push({ el:h, link:a });
  });

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const match = links.find(l => l.el === e.target);
      if (!match) return;
      if (e.isIntersecting) {
        links.forEach(l => l.link.classList.remove('active'));
        match.link.classList.add('active');
      }
    });
  }, { rootMargin:'-15% 0px -75% 0px', threshold:0 });
  headings.forEach(h => observer.observe(h));
})();
</script>
</body>
</html>
