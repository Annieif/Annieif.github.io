<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>003 · Annieif</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;
      --ink:#e8e4dd;
      --ink-dim:#c4bfb4;
      --ink-faint:#6e6a62;
      --accent:#f4c2d0;
      --link:#7ab4d8;
      --line:rgba(232,228,221,.10);
    }
    html,body{background:var(--bg);color:var(--ink);margin:0}
    body{
      font-family:"Fraunces",serif;
      font-weight:400;
      min-height:100vh;
      position:relative;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(122,180,216,.12), transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(244,194,208,.10), transparent 50%),
        #0a0a0a;
    }
    .stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .stars .layer{position:absolute;inset:-20%}
    .stars .s1{
      background-image:
        radial-gradient(1px 1px at 20px 30px, #fff, transparent 60%),
        radial-gradient(1px 1px at 80px 120px, #fff, transparent 60%),
        radial-gradient(1.5px 1.5px at 150px 60px, #e0dcd4, transparent 60%),
        radial-gradient(1px 1px at 220px 180px, #fff, transparent 60%),
        radial-gradient(1px 1px at 300px 40px, #8fb9d6, transparent 60%),
        radial-gradient(1.5px 1.5px at 380px 220px, #fff, transparent 60%);
      background-size:540px 400px;opacity:.85}
    .stars .s2{
      background-image:
        radial-gradient(1.5px 1.5px at 40px 50px, #fff, transparent 60%),
        radial-gradient(2px 2px at 180px 140px, #fff, transparent 60%),
        radial-gradient(1.5px 1.5px at 320px 80px, #f4c2d0, transparent 60%),
        radial-gradient(2px 2px at 260px 240px, #8fb9d6, transparent 60%);
      background-size:620px 600px;opacity:.65}
    .stars .s3{
      background-image:
        radial-gradient(2.5px 2.5px at 100px 80px, #fff, transparent 60%),
        radial-gradient(3px 3px at 280px 180px, #8fb9d6, transparent 60%),
        radial-gradient(2.5px 2.5px at 460px 280px, #f4c2d0, transparent 60%);
      background-size:700px 800px;opacity:.55}

    .page{position:relative;z-index:1;padding:80px 28px 120px;max-width:820px;margin:0 auto}
    .back{
      font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.2em;
      color:var(--ink-faint);text-decoration:none;text-transform:uppercase;
      display:inline-block;margin-bottom:80px}
    .back:hover{color:var(--accent)}
    .title{
      font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:700;
      font-size:clamp(56px,10vw,160px);line-height:1;color:var(--accent);
      letter-spacing:-.01em;margin:0 0 28px
    }
    .divider{height:1px;background:var(--line);margin:0 0 60px}
    .slot{
      font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.25em;
      text-transform:uppercase;color:var(--ink-faint);
      border:1px dashed var(--line);padding:80px 40px;text-align:center}
    .num{
      font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.25em;
      color:var(--ink-faint);margin-bottom:16px;display:block;text-transform:uppercase
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true">
    <div class="layer s1"></div>
    <div class="layer s2"></div>
    <div class="layer s3"></div>
  </div>
  <main class="page">
    <a class="back" href="../index.html">← 返回 / Back</a>
    <span class="num">003 / selected works</span>
    <h1 class="title">—</h1>
    <div class="divider"></div>
    <div class="slot">待补充 / to be added</div>
  </main>
</body>
</html>
